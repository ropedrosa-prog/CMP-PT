<!doctype html>
<html lang="pt-PT">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light dark">
    <meta name="description" content="Política de Privacidade da aplicação Car Manager Pro PT.">
    <title>Política de Privacidade — Car Manager Pro PT</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f8f7fc;
        --surface: #ffffff;
        --text: #171827;
        --muted: #5c5f72;
        --accent: #243b78;
        --border: #dedfec;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #11131d;
          --surface: #1a1d2a;
          --text: #f4f3fa;
          --muted: #b9bbca;
          --accent: #aebcff;
          --border: #33374a;
        }
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        background:
          radial-gradient(circle at 10% 0%, rgb(255 174 130 / 18%), transparent 32rem),
          radial-gradient(circle at 100% 20%, rgb(121 112 255 / 16%), transparent 34rem),
          var(--bg);
        color: var(--text);
        font: 16px/1.65 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(860px, calc(100% - 32px));
        margin: 48px auto;
        padding: clamp(24px, 5vw, 56px);
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 28px;
        box-shadow: 0 24px 70px rgb(25 28 48 / 10%);
      }

      h1, h2 { line-height: 1.25; }
      h1 { margin: 0 0 8px; font-size: clamp(2rem, 5vw, 3rem); }
      h2 { margin-top: 2.2rem; color: var(--accent); font-size: 1.35rem; }
      p, li { max-width: 75ch; }
      ul { padding-left: 1.3rem; }
      a { color: var(--accent); font-weight: 650; }
      .subtitle, .updated { color: var(--muted); }
      .summary {
        margin: 28px 0;
        padding: 20px 22px;
        border: 1px solid var(--border);
        border-radius: 18px;
        background: color-mix(in srgb, var(--accent) 6%, var(--surface));
      }
      .logo-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin-bottom: 20px;
    text-align: center;
}

.logo-container img {
    width: 25vw;
    max-width: 360px;
    min-width: 120px;
    height: auto;
    display: block;
}

.logo-container .subtitle {
    margin-top: 12px;
    text-align: center;
    width: 100%;
    font-size: 1.1rem;
}
      footer {
        margin-top: 40px;
        padding-top: 24px;
        border-top: 1px solid var(--border);
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main>
      <header>
     <div class="logo-container">
    <img src="logo.png" alt="Car Manager Pro PT Logo">
    <p class="subtitle">Car Manager Pro PT</p>
     </div>
       </header>

      
    </main>
  </body>
</html>
